<script>
    const CREATOR_PASSWORD = 'Nonagon45'; // new password
    let gossipList = JSON.parse(localStorage.getItem('gossipList')) || [];
    let isCreator = false;
    let notificationsEnabled = false;

    function showApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').classList.remove('app-hidden');
        updateNotificationButtonText();
        displayGossip();
    }

    function enterAsCreator() {
        const input = document.getElementById('creatorPassword').value;

        // Trim spaces and make case-insensitive
        const typed = input.trim().toLowerCase();
        const correct = CREATOR_PASSWORD.trim().toLowerCase();

        if (typed === correct) {
            isCreator = true;
            document.getElementById('roleTag').textContent = 'Creator mode: you can post and delete tea.';
            document.getElementById('guestHint').textContent = '';
            showApp();
        } else {
            alert('Wrong password. Try again or continue as guest.');
        }
    }

    function enterAsGuest() {
        isCreator = false;
        document.getElementById('roleTag').textContent = 'Guest mode: you can post tea but cannot delete.';
        document.getElementById('guestHint').textContent = 'Guest access: You can post tea, but only the creator can delete it.';
        showApp();
    }

    // Notification helpers
    function updateNotificationButtonText() {
        const btn = document.getElementById('notifyBtn');
        if (!('Notification' in window)) {
            btn.textContent = 'Notifications not supported';
            btn.disabled = true;
            return;
        }
        if (Notification.permission === 'granted' && notificationsEnabled) {
            btn.textContent = 'Notifications on 🔔';
        } else {
            btn.textContent = 'Allow notifications 🔔';
        }
    }

    function toggleNotifications() {
        if (!('Notification' in window)) {
            alert('This browser does not support notifications.');
            return;
        }

        if (Notification.permission === 'granted') {
            notificationsEnabled = !notificationsEnabled;
            updateNotificationButtonText();
            if (notificationsEnabled) {
                new Notification('Notifications enabled', {
                    body: 'You will get a ping whenever new tea is posted.',
                    icon: ''
                });
            }
            return;
        }

        Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
                notificationsEnabled = true;
                updateNotificationButtonText();
                new Notification('Notifications enabled', {
                    body: 'You will get a ping whenever new tea is posted.',
                    icon: ''
                });
            } else {
                notificationsEnabled = false;
                updateNotificationButtonText();
                alert('Notifications were blocked. You can change this in your browser settings.');
            }
        });
    }

    function sendNewTeaNotification(text) {
        if (!notificationsEnabled) return;
        if (!('Notification' in window)) return;
        if (Notification.permission !== 'granted') return;

        const preview = text.length > 50 ? text.slice(0, 47) + '...' : text;
        new Notification('New Tea Posted ☕', {
            body: preview,
            icon: ''
        });
    }

    function addGossip() {
        const input = document.getElementById('gossipInput');
        const text = input.value.trim();

        if (text === '') {
            alert('Please spill some tea first! 🍵');
            return;
        }

        const gossip = {
            id: Date.now(),
            text: text,
            time: new Date().toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            })
        };

        gossipList.unshift(gossip);
        localStorage.setItem('gossipList', JSON.stringify(gossipList));
        input.value = '';
        displayGossip();
        celebration();
        sendNewTeaNotification(text);
    }

    function deleteGossip(id) {
        if (!isCreator) {
            alert('Only the creator can delete tea. 💅');
            return;
        }

        gossipList = gossipList.filter(item => item.id !== id);
        localStorage.setItem('gossipList', JSON.stringify(gossipList));
        displayGossip();
    }

    function displayGossip() {
        const container = document.getElementById('gossipContainer');
        if (gossipList.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>No tea yet! Be the first to spill the gossip...</p></div>';
            return;
        }

        container.innerHTML = gossipList.map(gossip => `
            <div class="gossip-item">
                <p>${gossip.text}</p>
                <div class="gossip-time">Posted: ${gossip.time}</div>
                <button class="delete-btn" onclick="deleteGossip(${gossip.id})">Delete</button>
            </div>
        `).join('');
    }

    function celebration() {
        const emojis = ['✨', '💋', '☕', '🍵', '💬'];
        for (let i = 0; i < 10; i++) {
            const emoji = document.createElement('div');
            emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.position = 'fixed';
            emoji.style.left = Math.random() * window.innerWidth + 'px';
            emoji.style.top = '-30px';
            emoji.style.fontSize = '2em';
            emoji.style.animation = 'fall 3s linear';
            emoji.style.pointerEvents = 'none';
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 3000);
        }
    }

    const style = document.createElement('style');
    style.textContent = `
        @keyframes fall {
            to {
                transform: translateY(${window.innerHeight}px);
                opacity: 0;
            }
        }
    `;
    document.head.appendChild(style);

    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('gossipInput');
        input.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && event.ctrlKey) {
                addGossip();
            }
        });
    });
          </script>
